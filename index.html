<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>María Virginia Mattheus</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:        #0bc4a6;
      --teal-dim:    rgba(11,196,166,0.12);
      --teal-border: rgba(11,196,166,0.28);
      --violet:      #7c6ff7;
      --violet-dim:  rgba(124,111,247,0.12);
      --gold:        #e8a830;
      --gold-dim:    rgba(232,168,48,0.10);
      --bg:          #090f1e;
      --card:        #101828;
      --card-hi:     #141f30;
      --text:        #e2e8f0;
      --muted:       #8fa3bf;
      --divider:     rgba(255,255,255,0.07);
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 90% 55% at 10% 5%,  rgba(11,196,166,0.08)  0%, transparent 65%),
        radial-gradient(ellipse 70% 55% at 90% 95%, rgba(124,111,247,0.08) 0%, transparent 65%),
        radial-gradient(ellipse 50% 40% at 55% 50%, rgba(232,168,48,0.03)  0%, transparent 70%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1rem;
    }

    /* ── CARD ─────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 660px;
      background: var(--card);
      border-radius: 28px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.07),
        0 32px 80px rgba(0,0,0,0.55);
      position: relative;
    }

    .top-bar {
      height: 3px;
      background: linear-gradient(90deg, var(--teal) 0%, var(--violet) 55%, var(--gold) 100%);
    }

    /* ── LANG TOGGLE ──────────────────────────── */
    .lang-toggle {
      position: absolute;
      top: 1.1rem;
      right: 1.4rem;
      display: flex;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      overflow: hidden;
      z-index: 10;
    }

    .lang-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'Outfit', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      transition: all 0.18s;
    }

    .lang-btn.active {
      background: var(--teal-dim);
      color: var(--teal);
    }

    .lang-btn:hover:not(.active) {
      color: var(--text);
    }

    /* ── HERO ─────────────────────────────────── */
    .hero {
      padding: 2.6rem 2.8rem 2.2rem;
      position: relative;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 2.8rem; right: 2.8rem;
      height: 1px;
      background: var(--divider);
    }

    .name-row {
      display: flex;
      align-items: baseline;
      gap: 0.9rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.9rem, 5vw, 2.45rem);
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    .tag {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--teal);
      background: var(--teal-dim);
      border: 1px solid var(--teal-border);
      border-radius: 20px;
      padding: 0.22rem 0.7rem;
      white-space: nowrap;
      position: relative;
      top: -2px;
    }

    .tagline {
      font-size: 0.97rem;
      font-weight: 400;
      color: var(--muted);
      line-height: 1.65;
      max-width: 500px;
    }
    .tagline em {
      font-style: italic;
      color: #b8cce0;
    }

    /* ── ROLES ────────────────────────────────── */
    .roles {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .role-card {
      padding: 1.6rem 2rem 1.6rem 2.8rem;
      background: var(--card-hi);
      position: relative;
    }
    .role-card + .role-card {
      border-left: 1px solid var(--divider);
      padding-left: 2rem;
    }

    .role-org {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 0.35rem;
    }
    .role-card:first-child .role-org { color: var(--teal); }
    .role-card:last-child  .role-org { color: var(--violet); }

    .role-title {
      font-size: 0.93rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
      margin-bottom: 0.45rem;
    }

    .role-desc {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .role-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      margin-top: 0.65rem;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--violet);
      text-decoration: none;
      opacity: 0.85;
      transition: opacity 0.2s;
    }
    .role-link:hover { opacity: 1; }

    /* ── APPROACH ─────────────────────────────── */
    .approach {
      padding: 1.8rem 2.8rem;
      border-top: 1px solid var(--divider);
      border-bottom: 1px solid var(--divider);
    }

    .section-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.9rem;
    }

    .pillars {
      display: flex;
      gap: 0.55rem;
      flex-wrap: wrap;
      margin-bottom: 0.9rem;
    }

    .pillar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 0.5rem 1rem;
      font-size: 0.84rem;
      font-weight: 500;
      color: var(--text);
    }

    .pillar-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .approach-note {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.7;
      font-style: italic;
      padding-left: 1rem;
      border-left: 2px solid rgba(232,168,48,0.35);
    }

    /* ── FORMATION ────────────────────────────── */
    .formation {
      padding: 1.6rem 2.8rem;
      border-bottom: 1px solid var(--divider);
    }

    .formation-list {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      margin-top: 0.75rem;
    }

    .formation-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.85rem;
      color: var(--text);
      line-height: 1.4;
    }

    .formation-item::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--gold);
      flex-shrink: 0;
    }

    .formation-item span {
      color: var(--muted);
      font-size: 0.78rem;
    }

    /* ── CONTACT ──────────────────────────────── */
    .contact {
      padding: 1.8rem 2.8rem 2.4rem;
    }

    .contact-list {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      margin-top: 0.75rem;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }

    .contact-icon {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .ci-teal   { background: var(--teal-dim);   }
    .ci-violet { background: var(--violet-dim);  }
    .ci-gold   { background: var(--gold-dim);    }

    .contact-icon svg { display: block; }

    .contact-value {
      font-size: 0.87rem;
      color: var(--text);
      flex: 1;
      word-break: break-all;
    }

    .copy-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'Outfit', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      padding: 0.28rem 0.65rem;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .copy-btn:hover {
      border-color: var(--teal);
      color: var(--teal);
      background: var(--teal-dim);
    }
    .copy-btn.ok {
      border-color: #22c55e;
      color: #22c55e;
      background: rgba(34,197,94,0.09);
    }

    /* ── FOOTER ───────────────────────────────── */
    .footer {
      padding: 0.9rem 2.8rem;
      border-top: 1px solid var(--divider);
      background: rgba(0,0,0,0.18);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      font-size: 0.72rem;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .linkedin-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .linkedin-link:hover { color: var(--text); }

    /* ── RESPONSIVE ───────────────────────────── */
    @media (max-width: 540px) {
      .hero, .approach, .formation, .contact { padding-left: 1.4rem; padding-right: 1.4rem; }
      .hero::after { left: 1.4rem; right: 1.4rem; }

      .roles { grid-template-columns: 1fr; }
      .role-card { padding: 1.4rem; }
      .role-card + .role-card { border-left: none; border-top: 1px solid var(--divider); }

      .footer { padding: 0.8rem 1.4rem; flex-direction: column; align-items: flex-start; gap: 0.4rem; }
    }
  </style>
</head>
<body>
<div class="card">

  <div class="top-bar"></div>

  <!-- LANG TOGGLE -->
  <div class="lang-toggle">
    <button class="lang-btn active" id="btn-es" onclick="setLang('es')">ES</button>
    <button class="lang-btn"        id="btn-en" onclick="setLang('en')">EN</button>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="name-row">
      <h1>María Virginia Mattheus</h1>
      <span class="tag">Lic. Econ · MBA · Coach</span>
    </div>
    <p class="tagline" id="tagline"></p>
  </div>

  <!-- ROLES -->
  <div class="roles">
    <div class="role-card">
      <div class="role-org">Isowean S.A.</div>
      <div class="role-title" id="role1-title"></div>
      <div class="role-desc"  id="role1-desc"></div>
    </div>
    <div class="role-card">
      <div class="role-org" id="role2-org"></div>
      <div class="role-title" id="role2-title"></div>
      <div class="role-desc"  id="role2-desc"></div>
      <a class="role-link" href="https://www.conexionagil.com" target="_blank">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        conexionagil.com
      </a>
    </div>
  </div>

  <!-- APPROACH -->
  <div class="approach">
    <div class="section-label" id="label-approach"></div>
    <div class="pillars">
      <div class="pillar"><span class="pillar-dot" style="background:var(--teal)"></span><span id="pillar1"></span></div>
      <div class="pillar"><span class="pillar-dot" style="background:var(--violet)"></span><span id="pillar2"></span></div>
      <div class="pillar"><span class="pillar-dot" style="background:var(--gold)"></span><span id="pillar3"></span></div>
    </div>
    <p class="approach-note" id="approach-note"></p>
  </div>

  <!-- FORMATION -->
  <div class="formation">
    <div class="section-label" id="label-formation"></div>
    <div class="formation-list">
      <div class="formation-item">B.A. in Economics&nbsp;<span id="f1-inst"></span></div>
      <div class="formation-item"><span id="f2-title"></span>&nbsp;<span>— CEOP</span></div>
      <div class="formation-item"><span id="f3-title"></span>&nbsp;<span>— Edvance Business School</span></div>
    </div>
  </div>

  <!-- CONTACT -->
  <div class="contact">
    <div class="section-label" id="label-contact"></div>
    <div class="contact-list">

      <div class="contact-item">
        <div class="contact-icon ci-teal">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 01-2.06 0L2 7"/>
          </svg>
        </div>
        <span class="contact-value">mmattheus@isowean.com.ar</span>
        <button class="copy-btn" id="copy1" onclick="copyText(this,'mmattheus@isowean.com.ar')"></button>
      </div>

      <div class="contact-item">
        <div class="contact-icon ci-violet">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--violet)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 01-2.06 0L2 7"/>
          </svg>
        </div>
        <span class="contact-value">mavimattheus@gmail.com</span>
        <button class="copy-btn" id="copy2" onclick="copyText(this,'mavimattheus@gmail.com')"></button>
      </div>

      <div class="contact-item">
        <div class="contact-icon ci-gold">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
          </svg>
        </div>
        <span class="contact-value">+54 3467 44-2120</span>
        <button class="copy-btn" id="copy3" onclick="copyText(this,'+543467442120')"></button>
      </div>

    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span>María Virginia Mattheus · <span id="yr"></span></span>
    <a class="linkedin-link" href="https://www.linkedin.com/in/mavimattheus/" target="_blank">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
      </svg>
      LinkedIn · mavimattheus
    </a>
  </div>

</div>

<script>
  const T = {
    es: {
      tagline:        'Facilito la transformación organizacional con un enfoque sistémico: <em>personas, procesos y tecnología al mismo tiempo.</em>',
      role1title:     'Facilitadora de Mejora Continua y TICs',
      role1desc:      'Implementación de sistemas de gestión, digitalización de procesos e integración tecnológica.',
      role2org:       'Consultoría propia',
      role2title:     'Estrategia · Liderazgo · Agilidad',
      role2desc:      'Acompañamiento organizacional a través de <strong style="color:#e2e8f0">ConexiónÁgil</strong>, mi plataforma de transformación.',
      labelApproach:  'Enfoque distintivo',
      pillar1:        'Tecnología',
      pillar2:        'Personas',
      pillar3:        'Procesos',
      approachNote:   'Lidero la mejora continua con una mirada integral: intervengo en la dimensión que más lo necesita en cada momento, sin perder el sistema de vista.',
      labelFormation: 'Formación',
      f1inst:         '— Universidad Nacional de Córdoba',
      f2title:        'Coach Ontológico Profesional',
      f3title:        'Maestría en Business Agility',
      labelContact:   'Contacto',
      copyLabel:      'Copiar',
      copiedLabel:    '✓ Copiado',
    },
    en: {
      tagline:        'I facilitate organizational transformation with a systemic approach: <em>people, processes and technology — all at once.</em>',
      role1title:     'Continuous Improvement & IT Facilitator',
      role1desc:      'Management system implementation, process digitalization and technology integration.',
      role2org:       'Independent consulting',
      role2title:     'Strategy · Leadership · Agility',
      role2desc:      'Organizational accompaniment through <strong style="color:#e2e8f0">ConexiónÁgil</strong>, my transformation platform.',
      labelApproach:  'Distinctive approach',
      pillar1:        'Technology',
      pillar2:        'People',
      pillar3:        'Processes',
      approachNote:   'I lead continuous improvement with a holistic view: I intervene in whichever dimension needs it most at any given moment, without losing sight of the system as a whole.',
      labelFormation: 'Education',
      f1inst:         '— National University of Córdoba',
      f2title:        'Professional Ontological Coach',
      f3title:        'Master\'s in Business Agility',
      labelContact:   'Contact',
      copyLabel:      'Copy',
      copiedLabel:    '✓ Copied',
    }
  };

  let currentLang = 'es';

  function setLang(lang) {
    currentLang = lang;
    const t = T[lang];

    document.documentElement.lang = lang;
    document.getElementById('tagline').innerHTML        = t.tagline;
    document.getElementById('role1-title').textContent  = t.role1title;
    document.getElementById('role1-desc').textContent   = t.role1desc;
    document.getElementById('role2-org').textContent    = t.role2org;
    document.getElementById('role2-title').textContent  = t.role2title;
    document.getElementById('role2-desc').innerHTML     = t.role2desc;
    document.getElementById('label-approach').textContent = t.labelApproach;
    document.getElementById('pillar1').textContent      = t.pillar1;
    document.getElementById('pillar2').textContent      = t.pillar2;
    document.getElementById('pillar3').textContent      = t.pillar3;
    document.getElementById('approach-note').textContent = t.approachNote;
    document.getElementById('label-formation').textContent = t.labelFormation;
    document.getElementById('f1-inst').textContent      = t.f1inst;
    document.getElementById('f2-title').textContent     = t.f2title;
    document.getElementById('f3-title').textContent     = t.f3title;
    document.getElementById('label-contact').textContent = t.labelContact;

    // reset copy buttons to current lang label
    ['copy1','copy2','copy3'].forEach(id => {
      const btn = document.getElementById(id);
      if (!btn.classList.contains('ok')) btn.textContent = t.copyLabel;
    });

    document.getElementById('btn-es').classList.toggle('active', lang === 'es');
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  }

  function copyText(btn, text) {
    const t = T[currentLang];
    const doIt = () => {
      btn.textContent = t.copiedLabel;
      btn.classList.add('ok');
      setTimeout(() => {
        btn.textContent = t.copyLabel;
        btn.classList.remove('ok');
      }, 2000);
    };
    navigator.clipboard.writeText(text).then(doIt).catch(() => {
      const el = document.createElement('textarea');
      el.value = text;
      el.style.cssText = 'position:fixed;opacity:0';
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      doIt();
    });
  }

  document.getElementById('yr').textContent = new Date().getFullYear();
  setLang('es');
</script>

</body>
</html>
